<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Seni Budaya - SIAKAD Lady</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .back-button {
            margin: 20px 0;
        }
        .hero-quiz {
            background: linear-gradient(135deg, #f093fb10 0%, #f5576c10 100%);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid #f093fb20;
        }
        .quiz-card {
            transition: all 0.3s ease;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            height: 100%;
            background: white;
        }
        .quiz-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(240, 147, 251, 0.2);
        }
        .quiz-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            color: white;
            position: relative;
        }
        .quiz-number {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 48px;
            font-weight: bold;
            opacity: 0.2;
            color: white;
        }
        .quiz-body {
            padding: 25px;
        }
        .btn-quiz {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-quiz:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(240, 147, 251, 0.3);
            color: white;
        }
        .social-icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            color: white;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            background: #f093fb;
            transform: translateY(-5px);
            color: white;
        }
        .footer {
            background: #1a1a2e;
            color: white;
            padding: 60px 0 20px;
            margin-top: 60px;
        }
        .google-form {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>
<div style="height: 70px;"></div>

<!-- BUTTON KEMBALI -->
<div class="container">
    <div class="back-button">
        <a href="quiz.html" class="btn btn-outline-primary rounded-pill">
            <i class="fas fa-arrow-left me-2"></i>Kembali ke Pilihan Quiz
        </a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <!-- Hero Section -->
    <div class="hero-quiz" data-aos="fade-up">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="display-5 fw-bold mb-3">📝 Quiz Seni Budaya</h1>
                <p class="lead mb-3">Uji pemahaman Anda tentang materi Seni Budaya melalui quiz interaktif</p>
                <div class="d-flex gap-3">
                    <span class="badge bg-primary">1 Quiz Tersedia</span>

                </div>
            </div>
            <div class="col-md-4 text-center">
                <i class="fas fa-puzzle-piece fa-5x text-warning"></i>
            </div>
        </div>
    </div>

    <!-- DAFTAR QUIZ (3 Quiz) -->
    <div class="row g-4 mb-5">
        <!-- Quiz 1: Seni budaya -->
        <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
            <div class="quiz-card">
                <div class="quiz-header">
                    <i class="fas fa-pen-fancy fa-2x mb-2"></i>
                    <h4 class="mb-0">Quiz 1</h4>
                    <div class="quiz-number">01</div>
                </div>
                <div class="quiz-body">
                    <h5 class="fw-bold mb-2">Ayo tes kemampuan kamu!</h5>
                    <p class="text-muted small mb-3">Semangat!</p>
                    
                    
                    <div class="progress mb-3" style="height: 5px;">
                        <div class="progress-bar bg-warning" style="width: 0%"></div>
                    </div>
                    
                    <!-- Integrasi Google Form -->
                    <a href="https://docs.google.com/document/d/11JqTL0YRJD3ok4XcNVYAwt0QoqsRyHJXp_GbHNQ4ab0/edit?usp=sharing" class="btn btn-quiz w-100" target="_blank">
                        <i class="fas fa-play-circle me-2"></i>Mulai Quiz
                    </a>
                </div>
            </div>
        </div>

        
    </div>




</div>

   <!-- SECTION 3: FOOTER -->
     <div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JS -->
     <script src="js/template.js"></script>
    
<script>
    AOS.init();
</script>
</body>
</html>
