<script>
// Fungsi untuk menandai menu aktif berdasarkan halaman
function setActiveMenu() {
    const path = window.location.pathname;
    const page = path.split('/').pop();
    
    // Reset semua active
    document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
    });
    
    // Set active berdasarkan halaman
    if (page === 'index.html' || page === '' || page === '/') {
        document.getElementById('nav-dashboard')?.classList.add('active');
    }
    else if (page.includes('modul')) {
        document.querySelectorAll('.nav-link.dropdown-toggle')[0]?.classList.add('active');
    }
    else if (page.includes('quiz')) {
        document.querySelectorAll('.nav-link.dropdown-toggle')[1]?.classList.add('active');
    }
    else if (page.includes('ulangan')) {
        document.querySelectorAll('.nav-link.dropdown-toggle')[2]?.classList.add('active');
    }
    else if (page.includes('berkas')) {
        document.querySelectorAll('.nav-link.dropdown-toggle')[3]?.classList.add('active');
    }
}

// Jalankan setelah navbar di-load
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(setActiveMenu, 100); // Delay sedikit untuk memastikan DOM sudah siap
});
</script>
