<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkas Nilai Bali - SIAKAD Lady</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .back-button {
            position: absolute;
            top: 100px;
            left: 20px;
            z-index: 100;
        }
        .nilai-card {
            transition: all 0.3s ease;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .nilai-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102,126,234,0.2);
        }
        .nilai-icon {
            width: 80px;
            height: 80px;
            line-height: 80px;
            text-align: center;
            border-radius: 50%;
            font-size: 32px;
            margin: 0 auto 20px;
        }
        .bg-quiz { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .bg-uh { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .bg-pts { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .bg-sas { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .bg-wajib { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>

                </div>
            </div>
